<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    h3 {
      margin: 0 0 15px 0;
      color: #333;
      font-size: 16px;
    }
    .button {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .button-primary {
      background: #4CAF50;
      color: white;
    }
    .button-primary:hover {
      background: #45a049;
    }
    .button-secondary {
      background: #2196F3;
      color: white;
    }
    .button-secondary:hover {
      background: #1976D2;
    }
    .info {
      margin-top: 15px;
      padding: 10px;
      background: #e3f2fd;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
    }
    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status-success {
      background: #d4edda;
      color: #155724;
    }
    .status-error {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h3>🖼️ PhotoRoom Background Remover</h3>
  
  <button id="firstImage" class="button button-primary">
    Remove Background from First Image
  </button>
  
  <button id="allImages" class="button button-secondary">
    Show All Images on Page
  </button>
  
  <div class="info">
    <strong>Tip:</strong> You can also right-click any image and select "Remove Background with PhotoRoom"
  </div>
  
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
